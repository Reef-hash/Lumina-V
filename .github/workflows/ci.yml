name: CI

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - src/**
      - cmake/**
      - CMakeLists.txt
      - .github/workflows/ci.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: windows-latest
    name: CI
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Check CMake version
        run: cmake --version

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Generate CMake project
        run: cmake -D CMAKE_BUILD_TYPE=RelWithDebInfo -D OPTIMIZE=YES -S. -Bbuild -G Ninja

      - name: Build 64bit release DLL
        run: cmake --build ./build --config RelWithDebInfo --target LuminaV --

      - name: Check if DLL got built
        run: if (-Not (Test-Path -path "build/LuminaV.dll")) { throw "DLL not found" }

      - name: Rename DLL with commit SHA
        run: |
          Rename-Item -Path "LuminaV.dll" -NewName "LuminaV-dev-${{ github.sha }}.dll"
        working-directory: build/

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuminaV-dev-${{ github.sha }}
          path: build/LuminaV-dev-${{ github.sha }}.dll

      - name: Upload PDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuminaV-pdb-${{ github.sha }}
          path: build/LuminaV.pdb

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: "Dev Build ${{ github.sha }}"
          tag_name: "ci-${{ github.sha }}"
          body: |
            **Automated Dev Build**
            Branch: `main`
            Commit: `${{ github.sha }}`

            Inject `LuminaV-dev-${{ github.sha }}.dll` into GTA V.
          files: |
            build/LuminaV-dev-${{ github.sha }}.dll
            build/LuminaV.pdb
          prerelease: true
